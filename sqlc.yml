version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "internal/api/author/repository/author_query.sql"
    schema:
      - "internal/db/migration/"
    gen:
      go:
        package: "codegen"
        out: "internal/api/author/repository/codegen"
        sql_package: "pgx/v5"
        emit_interface: true
